<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nikita — Vibe Coder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05060a;
    --glass:rgba(255,255,255,.04);
    --stroke:rgba(255,255,255,.12);
    --c1:#7c5cff;   /* violet */
    --c2:#16e0c8;   /* teal   */
    --c3:#ff4dd6;   /* pink   */
    --text:#eef1ff;
    --muted:#9aa3c7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Space Grotesk",system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100dvh;
    display:grid;
    place-items:center;
    overflow:hidden;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- animated aurora background ---------- */
  .aurora{position:fixed;inset:-30%;z-index:0;filter:blur(90px);opacity:.65}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:float 18s ease-in-out infinite}
  .b1{width:46vw;height:46vw;background:var(--c1);top:5%;left:8%}
  .b2{width:40vw;height:40vw;background:var(--c2);bottom:0%;right:6%;animation-delay:-6s}
  .b3{width:34vw;height:34vw;background:var(--c3);top:30%;left:42%;animation-delay:-11s}
  @keyframes float{
    0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(6%,-8%) scale(1.12)}
    66%{transform:translate(-7%,6%) scale(.92)}
  }
  .grid-overlay{position:fixed;inset:0;z-index:0;
    background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:40px 40px;
    mask-image:radial-gradient(circle at 50% 45%,#000 0%,transparent 75%);
  }

  /* ---------- card ---------- */
  .scene{position:relative;z-index:2;perspective:1400px}
  .card{
    width:min(420px,92vw);
    padding:38px 34px 30px;
    border-radius:26px;
    background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
    border:1px solid var(--stroke);
    backdrop-filter:blur(22px) saturate(160%);
    -webkit-backdrop-filter:blur(22px) saturate(160%);
    box-shadow:0 30px 80px -20px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.18);
    transform-style:preserve-3d;
    transition:transform .15s ease-out;
    position:relative;
    overflow:hidden;
  }
  /* moving sheen */
  .card::before{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:radial-gradient(600px circle at var(--mx,50%) var(--my,0%),rgba(255,255,255,.14),transparent 40%);
  }
  /* neon top line */
  .card::after{
    content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c1));
    background-size:300% 100%;animation:slide 6s linear infinite;
  }
  @keyframes slide{to{background-position:300% 0}}

  .lift{transform:translateZ(40px)}

  .avatar{
    width:78px;height:78px;border-radius:20px;display:grid;place-items:center;
    font-size:30px;font-weight:700;letter-spacing:-1px;
    background:linear-gradient(135deg,var(--c1),var(--c3));
    box-shadow:0 10px 30px -6px rgba(124,92,255,.6);
    margin-bottom:20px;color:#fff;
  }
  .name{font-size:34px;font-weight:700;letter-spacing:-.5px;line-height:1.05;
    background:linear-gradient(90deg,#fff,#c9c3ff 40%,var(--c2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .handle{color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:13px;margin-top:6px}

  .typed{
    font-family:"JetBrains Mono",monospace;font-size:15px;margin:20px 0 4px;
    color:var(--c2);min-height:22px;
  }
  .cursor{display:inline-block;width:8px;height:17px;background:var(--c2);
    margin-left:2px;vertical-align:-2px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .tags{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0 26px}
  .tag{font-size:12px;padding:7px 13px;border-radius:999px;
    border:1px solid var(--stroke);background:var(--glass);color:#dfe3ff;
    font-family:"JetBrains Mono",monospace}

  .links{display:flex;gap:11px}
  .lnk{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 10px;border-radius:14px;text-decoration:none;cursor:pointer;
    font-size:13px;font-weight:600;color:var(--text);
    border:1px solid var(--stroke);background:var(--glass);
    transition:.2s transform,.2s box-shadow,.2s border-color;
  }
  .lnk:hover{transform:translateY(-3px);border-color:rgba(124,92,255,.6);
    box-shadow:0 12px 26px -10px rgba(124,92,255,.7)}
  .lnk svg{width:17px;height:17px}
  .lnk.primary{background:linear-gradient(135deg,var(--c1),var(--c3));border:none;color:#fff}
  .lnk.primary:hover{box-shadow:0 14px 30px -8px rgba(255,77,214,.7)}

  .foot{margin-top:22px;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;
    font-family:"JetBrains Mono",monospace}
  .dot{width:8px;height:8px;border-radius:50%;background:#27e07a;box-shadow:0 0 10px #27e07a;
    animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.4;transform:scale(.8)}}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* QR modal */
  .overlay{position:fixed;inset:0;z-index:50;display:none;place-items:center;
    background:rgba(3,4,8,.7);backdrop-filter:blur(8px)}
  .overlay.show{display:grid}
  .qrbox{background:#fff;padding:24px;border-radius:22px;text-align:center;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.8);animation:pop .25s ease-out}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  #qr{width:220px;height:220px;display:grid;place-items:center}
  #qr img,#qr canvas{width:220px!important;height:220px!important;border-radius:8px}
  .qrbox p{margin-top:14px;color:#111;font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:600}
  .qrbox small{color:#888;font-size:11px}
</style>
</head>
<body>
  <div class="aurora">
    <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  </div>
  <div class="grid-overlay"></div>

  <div class="scene">
    <div class="card" id="card">
      <div class="lift">
        <h1 class="name">@deovt</h1>

        <div class="typed"><span id="type"></span><span class="cursor"></span></div>

        <div class="tags">
          <span class="tag">Vibe&nbsp;Coder</span>
          <span class="tag">UI/UX&nbsp;Designer</span>
          <span class="tag">Developer</span>
        </div>

        <div class="links">
          <a class="lnk primary" href="https://t.me/deovt" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.9 4.3 18.6 20c-.2 1-.9 1.3-1.8.8l-4.9-3.6-2.4 2.3c-.3.3-.5.5-1 .5l.4-5 9-8.1c.4-.3-.1-.5-.6-.2L6.6 13.6l-4.8-1.5c-1-.3-1-1 .2-1.5L20.6 3c.9-.3 1.6.2 1.3 1.3z"/></svg>
            Написать в Telegram
          </a>
        </div>

        <div class="links" style="margin-top:11px">
          <button class="lnk" id="qrBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v.01M17 21h4M21 17v4"/></svg>
            QR-код
          </button>
          <button class="lnk" id="dlBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            Скачать
          </button>
        </div>

        <div class="foot"><span class="dot"></span> Открыт к заказам · building cool things</div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="qrbox">
      <div id="qr"></div>
      <p>Telegram · @deovt</p>
      <small>наведи камеру телефона</small>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
  // typed roles
  const roles=["< Vibe Coder />","UI/UX Designer ✦","Developer { } "];
  const el=document.getElementById('type');
  let r=0,i=0,del=false;
  (function loop(){
    const w=roles[r];
    el.textContent=del?w.slice(0,i--):w.slice(0,i++);
    if(!del&&i>w.length){del=true;setTimeout(loop,1400);return;}
    if(del&&i<0){del=false;r=(r+1)%roles.length;i=0;}
    setTimeout(loop,del?40:75);
  })();

  // 3D tilt + sheen
  const card=document.getElementById('card');
  const scene=document.querySelector('.scene');
  scene.addEventListener('mousemove',e=>{
    const b=card.getBoundingClientRect();
    const x=(e.clientX-b.left)/b.width, y=(e.clientY-b.top)/b.height;
    card.style.transform=`rotateY(${(x-.5)*16}deg) rotateX(${(.5-y)*16}deg)`;
    card.style.setProperty('--mx',x*100+'%');
    card.style.setProperty('--my',y*100+'%');
  });
  scene.addEventListener('mouseleave',()=>card.style.transform='');

  // ---- QR code ----
  const SITE="https://t.me/deovt";
  const overlay=document.getElementById('overlay');
  let qrMade=false;
  document.getElementById('qrBtn').addEventListener('click',()=>{
    if(!qrMade){
      new QRCode(document.getElementById('qr'),{text:SITE,width:220,height:220,
        colorDark:"#05060a",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
      qrMade=true;
    }
    overlay.classList.add('show');
  });
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('show')});

  // ---- download as image ----
  document.getElementById('dlBtn').addEventListener('click',async()=>{
    card.style.transform='';
    const canvas=await html2canvas(card,{backgroundColor:null,scale:3,useCORS:true,
      onclone:(doc)=>{
        const c=doc.getElementById('card');
        c.style.background='linear-gradient(160deg,#231b52,#0b0b18)';
        c.style.backdropFilter='none';
        c.style.webkitBackdropFilter='none';
        c.style.transform='none';
        const n=doc.querySelector('.name');
        n.style.background='none';
        n.style.color='#ffffff';
        n.style.webkitTextFillColor='#ffffff';
        // hide interactive-only buttons in the saved image
        doc.querySelectorAll('#qrBtn,#dlBtn').forEach(b=>b.closest('.links').style.display='none');
        doc.querySelector('.cursor').style.display='none';
        doc.getElementById('type').textContent='< Vibe Coder />';
      }});
    const a=document.createElement('a');
    a.download='deovt-card.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
  });
</script>
</body>
</html>
